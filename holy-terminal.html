<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HolyC Terminal · Apple II Universal Machine</title>
<link rel="stylesheet" href="./styles.css">
<style>
body { display: flex; flex-direction: column; }
#term-header { border-bottom: 1px solid #1a3a1a; padding: 8px 16px; font-size: 10px; color: #0a0; letter-spacing: 1px; }
#terminal { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 12px; line-height: 1.5; }
.line { white-space: pre-wrap; word-break: break-all; }
.l-green { color: #0f0; } .l-cyan { color: #0ff; } .l-yellow { color: #fa0; }
.l-red { color: #f44; } .l-dim { color: #333; } .l-white { color: #e0e0e0; }
#input-row { display: flex; border-top: 1px solid #1a3a1a; padding: 8px 16px; }
.prompt { color: #0f0; font-size: 12px; white-space: nowrap; }
#cmd-input { flex: 1; background: transparent; border: none; color: #0f0; font-family: 'Courier New', monospace; font-size: 12px; outline: none; }
#honest-banner { border-top: 1px solid #1a3a1a; padding: 6px 16px; font-size: 9px; color: #555; text-align: center; }
</style>
</head>
<body>
<div id="term-header">HOLY SIMULATED TERMINAL — Not real Ring 0 HolyC</div>
<div id="terminal"></div>
<div id="input-row">
  <span class="prompt">HolySim&gt; </span>
  <input id="cmd-input" autofocus autocomplete="off" spellcheck="false" />
</div>
<div id="honest-banner">CURRENT MODE: HOLY_SIM — This is a browser-safe simulation, not real Ring 0 HolyC execution.</div>
<script src="./seal.js"></script>
<script src="./woz-vault.js"></script>
<script src="./ascii-registry.js"></script>
<script src="./trust-deed.js"></script>
<script src="./contracts/ada-contract-sim.js"></script>
<script src="./runtime/holy-sim.js"></script>
<script src="./runtime/runtime-registry.js"></script>
<script>
(function() {
  var term = document.getElementById('terminal');
  var input = document.getElementById('cmd-input');
  var history = [];
  var historyIdx = -1;

  function print(t, c) {
    var d = document.createElement('div');
    d.className = 'line ' + (c || 'l-green');
    d.textContent = t;
    term.appendChild(d);
    term.scrollTop = term.scrollHeight;
  }
  function prints(t, c) { t.split('\n').forEach(function(l) { print(l, c); }); }

  var CMDS = {
    help: function() {
      prints(
        '╔══════════════════════════════════════════╗\n' +
        '║  HolySim Commands                        ║\n' +
        '╠══════════════════════════════════════════╣\n' +
        '║  Help;          — show commands          ║\n' +
        '║  Boot;          — reboot                 ║\n' +
        '║  TrustDeed;     — show rules             ║\n' +
        '║  AgentStatus;   — agent info             ║\n' +
        '║  WozVault;      — audit log              ║\n' +
        '║  Seal;          — SHA-256 seal           ║\n' +
        '║  Debate("t");   — run debate             ║\n' +
        '║  Clear;         — clear terminal         ║\n' +
        '╚══════════════════════════════════════════╝',
        'l-cyan'
      );
    },
    boot: function() { prints(AsciiRegistry.renderAscii('sunboot'), 'l-green'); WozVault.writeAuditEvent({type:'REBOOT',agent:'USER'}); },
    holy: function() { prints(AsciiRegistry.renderAscii('verified'), 'l-green'); },
    trustdeed: function() { prints('TRUST DEED:\n  1. No remote execution\n  2. No hidden API calls\n  3. No paid services\n  4. Audit preserved\n  5. No silent failure\n  6. Every boot sealed', 'l-cyan'); },
    agentstatus: function() { prints('ENKI: active (sim)\nSENTINEL: active (sim)\nAll local, no remote.', 'l-green'); },
    wozvault: function() { var e = WozVault.readAuditLog(); prints('WOZ VAULT: ' + e.length + ' events', 'l-green'); },
    vault: function() { CMDS.wozvault(); },
    seal: function() {
      Seal.createSeal({type:'MANUAL'}).then(function(s) {
        WozVault.writeAuditEvent({type:'SEAL',agent:'USER',seal:s.hash});
        prints('SEAL: ' + s.hash + '\nSTATUS: SEALED ✓', 'l-cyan');
      });
    },
    debate: function(args) {
      var topic = args ? args.join(' ').replace(/[()"]/g,'') : 'consciousness';
      prints('DEBATE: "' + topic + '"\nENKI: proposing...\nSENTINEL: auditing...', 'l-cyan');
      WozVault.writeAuditEvent({type:'DEBATE',agent:'ARENA',topic:topic});
      Seal.createSeal({type:'DEBATE',topic:topic}).then(function(s) {
        prints('SEAL: ' + s.hash.slice(0,24) + '...\nSTATUS: VERIFIED', 'l-cyan');
      });
    },
    clear: function() { term.innerHTML = ''; }
  };

  function exec(cmd) {
    cmd = cmd.trim();
    if (!cmd) return;
    print('HolySim> ' + cmd, 'l-dim');
    history.push(cmd); historyIdx = history.length;

    // Parse: Command; or Command("args");
    var m = cmd.match(/^(\w+)\s*(?:\(\s*"([^"]*)"\s*\))?\s*;?\s*$/);
    var verb, args;
    if (m) {
      verb = m[1].toLowerCase();
      args = m[2] ? m[2].split(/\s+/) : [];
    } else {
      var p = cmd.split(/\s+/);
      verb = p[0].toLowerCase().replace(/;$/, '');
      args = p.slice(1).map(function(a){return a.replace(/[();"]/g,'');});
    }

    if (CMDS[verb]) CMDS[verb](args);
    else print('Unknown: ' + verb + ' — type Help;', 'l-red');
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { var v = input.value; input.value = ''; exec(v); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (historyIdx>0){historyIdx--;input.value=history[historyIdx];} }
    else if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIdx<history.length-1){historyIdx++;input.value=history[historyIdx];}else{historyIdx=history.length;input.value='';} }
  });

  prints(AsciiRegistry.renderAscii('sunboot'), 'l-green');
  prints('Type Help; for commands. HolyC-style syntax with semicolons.\n', 'l-dim');
})();
</script>
</body>
</html>
